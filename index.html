<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="./quiz.svg">
	<link rel="stylesheet" href="./styles.css">
	<title>Quizz</title>
</head>

<body>
	<h1>Quiz</h1>
	<section id="filteringSection">
		Choose Difficulty
		<select id="difficulty">
			<option value="">Any Difficulty</option>
			<option value="easy">Easy</option>
			<option value="medium">Medium</option>
			<option value="hard">Hard</option>
		</select>
		Number of Questions
		<select id="amount">
			<option value="5">5</option>
			<option value="10">10</option>
			<option value="15">15</option>
			<option value="20">20</option>
		</select>
	</section>
	<div id="startButtonDiv">
		<button id="startButton">Start Quiz</button>
	</div>

	<p id="timer"></p>
	<h2 id="loading">Loading..</h2>
	<section id="quizzes">


	</section>
	<section id="resultSection">
		<p>Your Score: <span><span id="score">0</span>/<span id="totalQuestion">0</span></span></p>
		<p>Time Taken: <span><span id="timeTaken"></span> seconds</span></p>
		<button id="restartButton">Restart Quiz</button>
	</section>
	<div id="nextButtonDiv">
		<button id="nextButton" disabled>Next</button>
	</div>
	<footer>
		<a class="footer-left" href="https://asiradnan.com" target="_blank"><img src="./asiradnan.png" height="24px"
				width="24px">
			<span>Asir Adnan</span></a>
		<a class="footer-right" href="https://github.com/asiradnan/quiz" target="_blank">
			<svg data-component="Octicon" aria-hidden="true" focusable="false" class="octicon octicon-mark-github"
				viewBox="0 0 24 24" width="24" height="24" fill="black" display="inline-block" overflow="visible">
				<path
					d="M10.226 17.284c-2.965-.36-5.054-2.493-5.054-5.256 0-1.123.404-2.336 1.078-3.144-.292-.741-.247-2.314.09-2.965.898-.112 2.111.36 2.83 1.01.853-.269 1.752-.404 2.853-.404 1.1 0 1.999.135 2.807.382.696-.629 1.932-1.1 2.83-.988.315.606.36 2.179.067 2.942.72.854 1.101 2 1.101 3.167 0 2.763-2.089 4.852-5.098 5.234.763.494 1.28 1.572 1.28 2.807v2.336c0 .674.561 1.056 1.235.786 4.066-1.55 7.255-5.615 7.255-10.646C23.5 6.188 18.334 1 11.978 1 5.62 1 .5 6.188.5 12.545c0 4.986 3.167 9.12 7.435 10.669.606.225 1.19-.18 1.19-.786V20.63a2.9 2.9 0 0 1-1.078.224c-1.483 0-2.359-.808-2.987-2.313-.247-.607-.517-.966-1.034-1.033-.27-.023-.359-.135-.359-.27 0-.27.45-.471.898-.471.652 0 1.213.404 1.797 1.235.45.651.921.943 1.483.943.561 0 .92-.202 1.437-.719.382-.381.674-.718.944-.943">
				</path>
			</svg>
			<span>View Code</span>

		</a>
	</footer>
	<script src="quiz.js"></script>
</body>

</html>
